name: "appstore-precheck"
description: "Read-only iOS App Store pre-submission scan — static rejection vectors with a GREEN/YELLOW/RED verdict."
branding:
  icon: "shield"
  color: "blue"

inputs:
  working-directory:
    description: "Directory to scan (repo root by default)."
    required: false
    default: "."
  fail-on:
    description: "Verdict at which the job fails: RED (default) or YELLOW."
    required: false
    default: "RED"
  sarif:
    description: "Emit a SARIF file and upload it to GitHub code-scanning (needs permissions: security-events: write)."
    required: false
    default: "false"
  annotations:
    description: "Emit inline PR annotations (::error/::warning) for each FAIL/WARN finding."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Run appstore-precheck scan
      shell: bash
      # Inputs are passed via env (never interpolated into the script) to avoid
      # command injection from user-controlled values.
      env:
        APC_WORKDIR: ${{ inputs.working-directory }}
        APC_FAIL_ON: ${{ inputs.fail-on }}
        APC_ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        scan="$APC_ACTION_PATH/skills/appstore-precheck/scripts/scan.sh"
        verdict="$APC_ACTION_PATH/skills/appstore-precheck/scripts/verdict.sh"

        cd "$APC_WORKDIR"
        out="$(bash "$scan" --dir .)"
        echo "$out"
        echo "----------------------------------------"
        summary="$(printf '%s\n' "$out" | bash "$verdict")"
        echo "$summary"

        v="$(printf '%s\n' "$summary" | sed -n 's/^VERDICT: //p')"
        {
          echo "## appstore-precheck: $v"
          echo ""
          echo '```'
          echo "$summary"
          echo '```'
        } >> "${GITHUB_STEP_SUMMARY:-/dev/null}"

        case "$APC_FAIL_ON" in
          YELLOW) [ "$v" = "GREEN" ] || { echo "::error::appstore-precheck verdict is $v (fail-on=YELLOW)"; exit 1; } ;;
          *)      [ "$v" != "RED" ] || { echo "::error::appstore-precheck verdict is RED"; exit 1; } ;;
        esac
    - name: Generate SARIF
      if: ${{ (success() || failure()) && inputs.sarif == 'true' }}
      shell: bash
      env:
        APC_WORKDIR: ${{ inputs.working-directory }}
        APC_ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        scan="$APC_ACTION_PATH/skills/appstore-precheck/scripts/scan.sh"
        cd "$APC_WORKDIR"
        bash "$scan" --dir . --format sarif > "$GITHUB_WORKSPACE/appstore-precheck.sarif"
    - name: Upload SARIF
      if: ${{ (success() || failure()) && inputs.sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
      with:
        sarif_file: appstore-precheck.sarif
        # Finding paths are relative to working-directory; tell code-scanning
        # where that checkout root is so subdir scans annotate the right files.
        checkout_path: ${{ github.workspace }}/${{ inputs.working-directory }}
    - name: Emit PR annotations
      if: ${{ (success() || failure()) && inputs.annotations == 'true' }}
      shell: bash
      env:
        APC_WORKDIR: ${{ inputs.working-directory }}
        APC_ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        scan="$APC_ACTION_PATH/skills/appstore-precheck/scripts/scan.sh"
        cd "$APC_WORKDIR"
        bash "$scan" --dir . --format json \
          | jq -r '.findings[]
                   | select(.suppressed==false and (.severity=="FAIL" or .severity=="WARN"))
                   | (if .severity=="FAIL" then "error" else "warning" end) as $lvl
                   | "::\($lvl)"
                     + (if .file then " file=\(.file)" + (if .line then ",line=\(.line)" else "" end) else "" end)
                     + "::\(.message)"'
