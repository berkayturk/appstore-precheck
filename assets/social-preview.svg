<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="field" cx="64%" cy="40%" r="80%" gradientUnits="userSpaceOnUse" fx="64%" fy="40%">
      <stop offset="0" stop-color="#15294C"/>
      <stop offset="1" stop-color="#0C1830"/>
    </radialGradient>
    <clipPath id="panel"><rect x="72" y="92" width="452" height="456" rx="30"/></clipPath>
  </defs>

  <!-- French-navy field -->
  <rect width="1280" height="640" fill="url(#field)"/>

  <!-- left: the dossier panel (Pierre's portrait) -->
  <rect x="64" y="96" width="452" height="456" rx="30" fill="#05101F" opacity="0.55"/>
  <rect x="72" y="92" width="452" height="456" rx="30" fill="#FBFBF9"/>
  <rect x="72" y="92" width="452" height="456" rx="30" fill="none" stroke="#0E1B33" stroke-opacity="0.10" stroke-width="2"/>
  <image href="mascot.png" x="78" y="86" width="440" height="440" clip-path="url(#panel)"/>
  <!-- dossier caption: a quiet portrait label, not a banner -->
  <text x="298" y="524" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="19" letter-spacing="3" fill="#8A6A52">PIERRE — REVIEWER</text>

  <!-- signature: the red 'NON' ink stamp, stamped on the dossier corner -->
  <g transform="rotate(-9 470 158)" opacity="0.95">
    <rect x="398" y="120" width="160" height="92" rx="9" fill="none" stroke="#CE2F22" stroke-width="5"/>
    <rect x="408" y="130" width="140" height="72" rx="4" fill="none" stroke="#CE2F22" stroke-width="2"/>
    <text x="478" y="150" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="13" letter-spacing="3" fill="#CE2F22">REVIEWED</text>
    <text x="478" y="192" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" letter-spacing="2" fill="#CE2F22">NON</text>
  </g>

  <!-- right: thesis -->
  <!-- repo lockup (label, not hero) -->
  <text x="582" y="150" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="30" font-weight="700" letter-spacing="0.5" fill="#79B0FF">appstore-precheck</text>

  <!-- hero thesis: serif, the official-notice voice -->
  <text x="580" y="248" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="700" fill="#EEF3FB">A French critic</text>
  <text x="580" y="306" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="700" fill="#EEF3FB">reviews your build —</text>
  <text x="580" y="364" font-family="Georgia,'Times New Roman',serif" font-size="52" font-style="italic" font-weight="400" fill="#9DC2FF">before Apple does.</text>

  <!-- the product's real verdict line, tabular -->
  <g font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="26" font-weight="700">
    <text x="582" y="446" fill="#46CC7C">PASS 13</text>
    <text x="742" y="446" fill="#E7B948">WARN 1</text>
    <text x="888" y="446" fill="#FF6E5E">FAIL 0</text>
    <text x="1010" y="446" fill="#9FB4D6">→</text>
    <text x="1046" y="446" fill="#46CC7C">GREEN</text>
  </g>

  <!-- footer: plain prose, no pill, no dot-list -->
  <text x="582" y="498" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="22" fill="#93A7C7">Read-only pre-submission review · 41 static + 28 Pierre deep checks</text>
  <text x="582" y="528" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="22" fill="#8398B8">Works in Claude Code, Codex, Cursor &amp; Gemini.</text>
</svg>
