name: Brew formula sync

# Fails loudly when the Homebrew tap (berkayturk/homebrew-tap) has fallen out of
# lockstep with the latest npm release. Fix: bash scripts/update-brew-formula.sh

on:
  schedule:
    - cron: '17 6 * * 1' # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Tap formula matches npm latest
        run: bash scripts/update-brew-formula.sh --check
